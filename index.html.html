<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Affe vs Theodor</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  canvas {
    background: black;
    margin-top: 20px;
    border: 2px solid white;
  }
</style>
</head>
<body>

<h1>Affe vs Theodor</h1>
<p>Poäng: <span id="score">0</span> | Rekord: <span id="highscore">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const gridSize = 20;

let snake, direction, food, score;
let highscore = 0;

// 🔥 fallback (funkar även om localStorage blockas)
try {
  const saved = localStorage.getItem("snakeHighscore");
  if (saved) highscore = saved;
} catch (e) {
  highscore = 0;
}

document.getElementById("highscore").innerText = highscore;

function resetGame() {
  snake = [{
    x: 10 * box,
    y: 10 * box
  }];
  direction = "RIGHT";
  score = 0;
  document.getElementById("score").innerText = score;
  food = spawnFood();
}

function spawnFood() {
  return {
    x: Math.floor(Math.random() * gridSize) * box,
    y: Math.floor(Math.random() * gridSize) * box
  };
}

// 🔥 bättre tangent-hantering
window.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

function collision(head, body) {
  return body.some(p => p.x === head.x && p.y === head.y);
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 400, 400);

  // snake
  snake.forEach((p, i) => {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(p.x, p.y, box, box);
  });

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= box;
  if (direction === "UP") headY -= box;
  if (direction === "RIGHT") headX += box;
  if (direction === "DOWN") headY += box;

  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = score;
    food = spawnFood();
  } else {
    snake.pop();
  }

  const newHead = {x: headX, y: headY};

  if (
    headX < 0 || headY < 0 ||
    headX >= 400 || headY >= 400 ||
    collision(newHead, snake)
  ) {

    // 🔥 safe save (funkar även om storage failar)
    if (score > highscore) {
      highscore = score;
      try {
        localStorage.setItem("snakeHighscore", highscore);
      } catch (e) {}
    }

    alert("Game Over!\nPoäng: " + score + "\nRekord: " + highscore);
    resetGame();
    return;
  }

  snake.unshift(newHead);
}

resetGame();
setInterval(draw, 100);
</script>

</body>
</html>
